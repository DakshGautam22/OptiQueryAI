version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: optiquery_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=optiquery_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma
    container_name: optiquery_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e \"exit(IO::Socket::INET->new(PeerAddr => '127.0.0.1', PeerPort => 8000, Timeout => 1) ? 0 : 1)\""]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: optiquery_backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/optiquery_ai
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
    volumes:
      - .:/app
    # Overridable command in dev to run with hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optiquery_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    # Overridable command in dev to run with hot reload
    command: npm run dev

  seed:
    image: postgres:16
    container_name: optiquery_seed
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./seed:/seed
    environment:
      - PGPASSWORD=postgres
    command: >
      sh -c "psql -h postgres -U postgres -c 'CREATE DATABASE demo_db;' || true && 
             psql -h postgres -U postgres -d demo_db -f /seed/seed.sql"

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
